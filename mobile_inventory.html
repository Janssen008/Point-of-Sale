<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>POS Mobile Inventory</title>
  <link rel="stylesheet" href="mobile_inventory.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Header -->
  <header class="app-header">
    <div class="header-title">
      <svg viewBox="0 0 24 24" width="26" height="26" fill="var(--accent)"><path d="M12,2A10,10 0 0,0 2,12A10,10 0 0,0 12,22A10,10 0 0,0 22,12A10,10 0 0,0 12,2M12,4A8,8 0 0,1 20,12C20,12.5 19.9,13.1 19.8,13.6L16.2,10H14V7.8L12.4,6.2C12.3,6.1 12.1,6 12,6A8,8 0 0,1 12,4M8.2,9L12,12.8L12.8,12L9,8.2C8.6,8.4 8.4,8.6 8.2,9M5.8,12H8V14.2L9.6,15.8C9.7,15.9 9.9,16 10,16C10.5,16 11,15.5 11,15L11,12.8L13.8,10H16.2L19.4,13.2C18.9,16.5 16.2,19.1 12.8,19.6L10,16.8V14.6L8.4,13C8.3,12.9 8.1,12.8 8,12.8A8,8 0 0,1 5.8,12Z"/></svg>
      <h1>Inventory Encoder</h1>
    </div>
    <div class="header-actions">
      <button class="icon-btn" onclick="app.loadData()" title="Refresh">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor"><path d="M17.65,6.35C16.2,4.9 14.21,4 12,4A8,8 0 0,0 4,12A8,8 0 0,0 12,20C15.73,20 18.84,17.45 19.73,14H17.65C16.83,16.33 14.61,18 12,18A6,6 0 0,1 6,12A6,6 0 0,1 12,6C13.66,6 15.14,6.69 16.22,7.78L13,11H20V4L17.65,6.35Z"/></svg>
      </button>
    </div>
  </header>

  <!-- Search Bar -->
  <div class="search-container">
    <div class="search-box">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" class="search-icon"><path d="M9.5,3A6.5,6.5 0 0,1 16,9.5C16,11.11 15.41,12.59 14.44,13.73L14.71,14H15.5L20.5,19L19,20.5L14,15.5V14.71L13.73,14.44C12.59,15.41 11.11,16 9.5,16A6.5,6.5 0 0,1 3,9.5A6.5,6.5 0 0,1 9.5,3M9.5,5C7,5 5,7 5,9.5C5,12 7,14 9.5,14C12,14 14,12 14,9.5C14,7 12,5 9.5,5Z"/></svg>
      <input type="text" id="search-input" placeholder="Search SKU, name, or scan barcode..." oninput="app.renderList()">
      <button class="clear-btn" id="search-clear" onclick="app.clearSearch()" style="display:none;">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M19,6.41L17.59,5L12,10.59L6.41,5L5,6.41L10.59,12L5,17.59L6.41,19L12,13.41L17.59,19L19,17.59L13.41,12L19,6.41Z"/></svg>
      </button>
    </div>
  </div>

  <!-- Loading State -->
  <div id="loading-state" class="center-state">
    <div class="spinner"></div>
    <p>Loading Inventory...</p>
  </div>

  <!-- Inventory List -->
  <main class="inventory-list" id="inventory-list" style="display: none;">
    <!-- Populated by JS -->
  </main>

  <!-- Empty State -->
  <div id="empty-state" class="center-state" style="display: none;">
    <svg viewBox="0 0 24 24" width="48" height="48" fill="currentColor" style="opacity: 0.3; margin-bottom: 12px;"><path d="M19,4H15.5L14.5,3H9.5L8.5,4H5V6H19M6,19A2,2 0 0,0 8,21H16A2,2 0 0,0 18,19V7H6V19Z"/></svg>
    <p>No parts found.</p>
  </div>

  <!-- Floating Action Buttons -->
  <button class="fab scan-fab" onclick="app.openScanner()" title="Scan Barcode">
    <svg viewBox="0 0 24 24" width="28" height="28" fill="currentColor"><path d="M4,6H6V18H4V6M7,6H8V18H7V6M9,6H12V18H9V6M13,6H14V18H13V6M16,6H18V18H16V6M19,6H20V18H19V6M2,4V8H0V4A2,2 0 0,1 2,2H6V4H2M22,2A2,2 0 0,1 24,4V8H22V4H18V2H22M2,16V20H6V22H2A2,2 0 0,1 0,20V16H2M22,20V16H24V20A2,2 0 0,1 22,22H18V20H22Z"/></svg>
  </button>
  
  <button class="fab add-fab" onclick="app.openPartModal()" title="Add Part">
    <svg viewBox="0 0 24 24" width="28" height="28" fill="currentColor"><path d="M19,13H13V19H11V13H5V11H11V5H13V11H19V13Z"/></svg>
  </button>

  <!-- Scanner Overlay -->
  <div class="overlay" id="scanner-overlay">
    <div class="scanner-container">
      <div class="scanner-header">
        <h3 id="scanner-title">Scan Barcode</h3>
        <button class="close-btn" onclick="app.closeScanner()">
          <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M19,6.41L17.59,5L12,10.59L6.41,5L5,6.41L10.59,12L5,17.59L6.41,19L12,13.41L17.59,19L19,17.59L13.41,12L19,6.41Z"/></svg>
        </button>
      </div>
      <div id="reader" style="width: 100%; border-radius: 8px; overflow: hidden; background: #000;"></div>
      <p class="scanner-hint">Point your camera at a barcode</p>
    </div>
  </div>

  <!-- Edit/Add Part Sheet -->
  <div class="bottom-sheet-overlay" id="part-sheet-overlay">
    <div class="bottom-sheet" id="part-sheet">
      <div class="sheet-header">
        <h3 id="sheet-title">Edit Part</h3>
        <button class="close-btn" onclick="app.closePartModal()">
          <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M19,6.41L17.59,5L12,10.59L6.41,5L5,6.41L10.59,12L5,17.59L6.41,19L12,13.41L17.59,19L19,17.59L13.41,12L19,6.41Z"/></svg>
        </button>
      </div>
      <div class="sheet-content">
        <form id="form-part" onsubmit="event.preventDefault(); app.savePart();">
          <input type="hidden" id="part-id">
          
          <div class="stock-adjust-container">
            <label style="color: var(--text-primary); font-size: 1.1rem;">Current Stock</label>
            <div class="stock-controls">
              <button type="button" class="stock-btn" onclick="app.adjustStock(-1)">-</button>
              <input type="number" id="part-stock" required class="stock-input" min="0">
              <button type="button" class="stock-btn stock-add" onclick="app.adjustStock(1)">+</button>
            </div>
          </div>

          <div class="form-group" style="margin-top: 20px;">
            <label>Name / Description *</label>
            <input type="text" id="part-name" required class="input-control">
          </div>

          <div class="form-group">
            <label>SKU Code *</label>
            <input type="text" id="part-sku" required class="input-control">
          </div>

          <div class="form-row">
            <div class="form-group">
              <label>Category *</label>
              <select id="part-category" required class="input-control">
                <option value="Tires">Tires</option>
                <option value="Brakes">Brakes</option>
                <option value="Fluids">Fluids</option>
                <option value="Filters">Filters</option>
                <option value="Drivetrain">Drivetrain</option>
                <option value="Electrical">Electrical</option>
                <option value="Accessories">Accessories</option>
              </select>
            </div>
            <div class="form-group">
              <label>Min Stock</label>
              <input type="number" id="part-min-stock" required class="input-control" value="2" min="0">
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label>Cost (₱) *</label>
              <input type="number" id="part-cost" required class="input-control" step="0.01" min="0">
            </div>
            <div class="form-group">
              <label>Sell Price (₱) *</label>
              <input type="number" id="part-price" required class="input-control" step="0.01" min="0">
            </div>
          </div>

          <div class="form-group">
            <label>Alt Barcodes (comma separated)</label>
            <div style="display: flex; gap: 8px;">
              <input type="text" id="part-alt-barcodes" class="input-control" style="font-family: monospace; font-size: 0.9rem;">
              <button type="button" class="btn btn-secondary btn-icon" onclick="app.openScanner('alt')" title="Scan barcode to add">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M4,6H6V18H4V6M7,6H8V18H7V6M9,6H12V18H9V6M13,6H14V18H13V6M16,6H18V18H16V6M19,6H20V18H19V6M2,4V8H0V4A2,2 0 0,1 2,2H6V4H2M22,2A2,2 0 0,1 24,4V8H22V4H18V2H22M2,16V20H6V22H2A2,2 0 0,1 0,20V16H2M22,20V16H24V20A2,2 0 0,1 22,22H18V20H22Z"/></svg>
              </button>
            </div>
          </div>

          <button type="submit" class="btn btn-primary btn-block" style="margin-top: 24px;">Save Inventory</button>
        </form>
      </div>
    </div>
  </div>

  <!-- Toast Notification -->
  <div id="toast-container" class="toast-container"></div>

  <!-- Scripts -->
  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script src="mobile_inventory.js"></script>
</body>
</html>
